name: Build IDnSpy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore IDnSpy/IDnSpy.csproj

      - name: Build
        run: dotnet build IDnSpy/IDnSpy.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish IDnSpy/IDnSpy.csproj -c Release -r win-x64 --self-contained -o artifacts/win-x64

      - name: Run app and take screenshot
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing

          $exePath = Join-Path $PWD "artifacts\win-x64\IDnSpy.exe"
          $screenshotPath = Join-Path $PWD "artifacts\screenshot.png"

          $proc = Start-Process -FilePath $exePath -PassThru
          Start-Sleep -Seconds 5

          $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bitmap = New-Object System.Drawing.Bitmap($bounds.Width, $bounds.Height)
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
          $bitmap.Save($screenshotPath, [System.Drawing.Imaging.ImageFormat]::Png)
          $graphics.Dispose()
          $bitmap.Dispose()

          $proc.Kill()
          Write-Host "Screenshot saved to $screenshotPath"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: IDnSpy-win-x64
          path: artifacts/win-x64/

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: artifacts/screenshot.png

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore IDnSpy/IDnSpy.csproj

      - name: Build
        run: dotnet build IDnSpy/IDnSpy.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish IDnSpy/IDnSpy.csproj -c Release -r linux-x64 --self-contained -o artifacts/linux-x64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: IDnSpy-linux-x64
          path: artifacts/linux-x64/

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore IDnSpy/IDnSpy.csproj

      - name: Build
        run: dotnet build IDnSpy/IDnSpy.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish IDnSpy/IDnSpy.csproj -c Release -r osx-arm64 --self-contained -o artifacts/osx-arm64

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: IDnSpy-osx-arm64
          path: artifacts/osx-arm64/
