name: Build IDnSpy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore IDnSpy/IDnSpy.csproj

      - name: Build
        run: dotnet build IDnSpy/IDnSpy.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish IDnSpy/IDnSpy.csproj -c Release -r win-x64 --self-contained -o artifacts/win-x64

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: IDnSpy-win-x64
          path: artifacts/win-x64/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore IDnSpy/IDnSpy.csproj

      - name: Build
        run: dotnet build IDnSpy/IDnSpy.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish IDnSpy/IDnSpy.csproj -c Release -r linux-x64 --self-contained -o artifacts/linux-x64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: IDnSpy-linux-x64
          path: artifacts/linux-x64/

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore IDnSpy/IDnSpy.csproj

      - name: Build
        run: dotnet build IDnSpy/IDnSpy.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish IDnSpy/IDnSpy.csproj -c Release -r osx-arm64 --self-contained -o artifacts/osx-arm64

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: IDnSpy-osx-arm64
          path: artifacts/osx-arm64/

  generate-screenshot:
    runs-on: ubuntu-latest
    needs: [build-linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: IDnSpy-linux-x64
          path: artifact

      - name: Generate README with build info
        run: |
          echo "# IDnSpy - Build Successful" > BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          echo "## Artifacts" >> BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          echo "| Platform | File |" >> BUILD_INFO.md
          echo "|----------|------|" >> BUILD_INFO.md
          echo "| Windows x64 | IDnSpy-win-x64.zip |" >> BUILD_INFO.md
          echo "| Linux x64 | IDnSpy-linux-x64.zip |" >> BUILD_INFO.md
          echo "| macOS ARM64 | IDnSpy-osx-arm64.zip |" >> BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          echo "## Screenshot" >> BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          echo "IDnSpy is a cross-platform GUI application built with Avalonia UI." >> BUILD_INFO.md
          echo "Download the artifact for your platform and run the executable." >> BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          echo "### Windows: \`IDnSpy.exe\`" >> BUILD_INFO.md
          echo "### Linux: \`chmod +x IDnSpy && ./IDnSpy\`" >> BUILD_INFO.md
          echo "### macOS: \`chmod +x IDnSpy && ./IDnSpy\`" >> BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          echo "![IDnSpy](https://raw.githubusercontent.com/Nestor53top/C-DEC/main/IDnSpy/screenshot.png)" >> BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          echo "Build: ${{ github.sha }}" >> BUILD_INFO.md

      - name: Upload build info
        uses: actions/upload-artifact@v4
        with:
          name: BUILD_INFO
          path: BUILD_INFO.md
